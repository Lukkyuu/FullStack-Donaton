version: '3.8'

services:
  # === DATABASE & MESSAGE BROKER ===
  postgres:
    image: postgres:15-alpine
    container_name: donaton-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-root}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: ${DB_NAME:-donaton}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - donaton-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER:-root}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: donaton-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-guest}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - donaton-network
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 10s
      timeout: 5s
      retries: 5

  # === FRONTEND ===
  frontend:
    build:
      context: ./
      dockerfile: Dockerfile
      args:
        VITE_BFF_URL: ${VITE_BFF_URL:-http://localhost:8080}
    container_name: donaton-frontend
    environment:
      VITE_BFF_URL: ${VITE_BFF_URL:-http://localhost:8080}
    ports:
      - "80:80"
    networks:
      - donaton-network

volumes:
  postgres_data:
  rabbitmq_data:

networks:
  donaton-network:
    driver: bridge
