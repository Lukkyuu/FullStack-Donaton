services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend
      args:
        # URL del BFF (Nginx API Gateway del backend)
        # Cambiar por la IP/dominio de la instancia AWS
        VITE_BFF_URL: ${VITE_BFF_URL:-http://donaton-alb-1949998216.us-west-2.elb.amazonaws.com}
    image: donaton-frontend:latest
    container_name: donaton-frontend
    ports:
      - "80:80"
    restart: unless-stopped
