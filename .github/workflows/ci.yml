name: CI / CD Pipeline

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main", "dev" ]

jobs:
  build-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/donaton-backend

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 21
      uses: actions/setup-java@v3
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven
        
    - name: Build with Maven
      run: |
        chmod +x ./mvnw
        ./mvnw clean package -DskipTests

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-west-2

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build, tag, and push image to Amazon ECR
      id: build-image
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        ECR_REPOSITORY: donaton-backend
        IMAGE_TAG: latest
      run: |
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
        docker build -f Dockerfile.auth -t $ECR_REGISTRY/donaton-auth:$IMAGE_TAG .
        docker push $ECR_REGISTRY/donaton-auth:$IMAGE_TAG
        docker build -f Dockerfile.necesidad -t $ECR_REGISTRY/donaton-necesidad:$IMAGE_TAG .
        docker push $ECR_REGISTRY/donaton-necesidad:$IMAGE_TAG
        docker build -f Dockerfile.donacion -t $ECR_REGISTRY/donaton-donacion:$IMAGE_TAG .
        docker push $ECR_REGISTRY/donaton-donacion:$IMAGE_TAG
        docker build -f Dockerfile.usuarios -t $ECR_REGISTRY/donaton-usuarios:$IMAGE_TAG .
        docker push $ECR_REGISTRY/donaton-usuarios:$IMAGE_TAG
        docker build -f Dockerfile.logistica -t $ECR_REGISTRY/donaton-logistica:$IMAGE_TAG .
        docker push $ECR_REGISTRY/donaton-logistica:$IMAGE_TAG
        docker build -f Dockerfile.matching -t $ECR_REGISTRY/donaton-matching:$IMAGE_TAG .
        docker push $ECR_REGISTRY/donaton-matching:$IMAGE_TAG
        docker build -f Dockerfile.notificaciones -t $ECR_REGISTRY/donaton-notificaciones:$IMAGE_TAG .
        docker push $ECR_REGISTRY/donaton-notificaciones:$IMAGE_TAG
        echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

    - name: Fill in the new image ID in the Amazon ECS task definition
      id: task-def
      uses: aws-actions/amazon-ecs-render-task-definition@v1
      with:
        task-definition: backend/donaton-backend/task-definition.json
        container-name: donaton-backend-container
        image: ${{ steps.build-image.outputs.image }}

    - name: Fill in the new image ID for Auth container
      id: task-def-auth
      uses: aws-actions/amazon-ecs-render-task-definition@v1
      with:
        task-definition: ${{ steps.task-def.outputs.task-definition }}
        container-name: donaton-auth-container
        image: ${{ steps.login-ecr.outputs.registry }}/donaton-auth:latest

    - name: Fill in the new image ID for Necesidad container
      id: task-def-necesidad
      uses: aws-actions/amazon-ecs-render-task-definition@v1
      with:
        task-definition: ${{ steps.task-def-auth.outputs.task-definition }}
        container-name: donaton-necesidad-container
        image: ${{ steps.login-ecr.outputs.registry }}/donaton-necesidad:latest

    - name: Fill in the new image ID for Donacion container
      id: task-def-donacion
      uses: aws-actions/amazon-ecs-render-task-definition@v1
      with:
        task-definition: ${{ steps.task-def-necesidad.outputs.task-definition }}
        container-name: donaton-donacion-container
        image: ${{ steps.login-ecr.outputs.registry }}/donaton-donacion:latest

    - name: Fill in the new image ID for Usuarios container
      id: task-def-usuarios
      uses: aws-actions/amazon-ecs-render-task-definition@v1
      with:
        task-definition: ${{ steps.task-def-donacion.outputs.task-definition }}
        container-name: donaton-usuarios-container
        image: ${{ steps.login-ecr.outputs.registry }}/donaton-usuarios:latest

    - name: Fill in the new image ID for Logistica container
      id: task-def-logistica
      uses: aws-actions/amazon-ecs-render-task-definition@v1
      with:
        task-definition: ${{ steps.task-def-usuarios.outputs.task-definition }}
        container-name: donaton-logistica-container
        image: ${{ steps.login-ecr.outputs.registry }}/donaton-logistica:latest

    - name: Fill in the new image ID for Matching container
      id: task-def-matching
      uses: aws-actions/amazon-ecs-render-task-definition@v1
      with:
        task-definition: ${{ steps.task-def-logistica.outputs.task-definition }}
        container-name: donaton-matching-container
        image: ${{ steps.login-ecr.outputs.registry }}/donaton-matching:latest

    - name: Fill in the new image ID for Notificaciones container
      id: task-def-notificaciones
      uses: aws-actions/amazon-ecs-render-task-definition@v1
      with:
        task-definition: ${{ steps.task-def-matching.outputs.task-definition }}
        container-name: donaton-notificaciones-container
        image: ${{ steps.login-ecr.outputs.registry }}/donaton-notificaciones:latest

    - name: Deploy Amazon ECS task definition
      uses: aws-actions/amazon-ecs-deploy-task-definition@v1
      with:
        task-definition: ${{ steps.task-def-notificaciones.outputs.task-definition }}
        service: donaton-backend-service
        cluster: donaton-cluster
        wait-for-service-stability: true
  build-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json
        
    - name: Install dependencies
      run: npm install
      
    - name: Build
      run: npm run build
      
    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
        aws-region: us-west-2
        
    - name: Deploy to S3
      run: aws s3 sync dist/ s3://donaton-frontend-bucket-729867975043/ --delete
