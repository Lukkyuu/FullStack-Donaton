server {
    listen       80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # Gzip para mejorar rendimiento
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1024;

    # Caché agresiva para assets con hash (JS, CSS, imágenes)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # index.html nunca en caché (garantiza que el usuario siempre
    # tenga la última versión del frontend)
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # CRÍTICO para React Router: cualquier ruta que no sea un archivo
    # estático devuelve index.html para que el router del cliente la maneje
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Ocultar versión de Nginx
    server_tokens off;
}
