spring.application.name=donaton-backend

# Database (RDS en AWS / localhost en desarrollo)
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/donaton}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# RabbitMQ (Amazon MQ en AWS / localhost en desarrollo)
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}
spring.rabbitmq.ssl.enabled=${RABBITMQ_SSL:false}

# JWT
jwt.secret=${JWT_SECRET:donaton_secret_key_must_be_at_least_32_chars_long!}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Actuator
management.endpoints.web.exposure.include=health,info

server.port=8082
