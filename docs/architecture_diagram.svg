<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 650" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bg-grad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1e293b" />
      <stop offset="100%" stop-color="#0f172a" />
    </radialGradient>

    <!-- Node Gradients -->
    <linearGradient id="fe-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>

    <linearGradient id="gw-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#d946ef" />
    </linearGradient>

    <linearGradient id="ms-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#10b981" />
    </linearGradient>

    <linearGradient id="db-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f43f5e" />
      <stop offset="100%" stop-color="#be185d" />
    </linearGradient>

    <linearGradient id="mq-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f97316" />
      <stop offset="100%" stop-color="#ea580c" />
    </linearGradient>

    <!-- Filters for Glow Effects -->
    <filter id="glow-fe" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#06b6d4" flood-opacity="0.4" />
    </filter>
    <filter id="glow-gw" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#d946ef" flood-opacity="0.4" />
    </filter>
    <filter id="glow-ms" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#10b981" flood-opacity="0.3" />
    </filter>
    <filter id="glow-db" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#f43f5e" flood-opacity="0.4" />
    </filter>
    <filter id="glow-mq" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#f97316" flood-opacity="0.4" />
    </filter>

    <!-- Arrow Head -->
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#94a3b8" />
    </marker>
    <marker id="arrow-pink" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#f43f5e" />
    </marker>
    <marker id="arrow-orange" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#f97316" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1000" height="650" rx="15" fill="url(#bg-grad)" />

  <!-- Diagram Title -->
  <text x="500" y="45" font-family="'Outfit', 'Inter', sans-serif" font-size="24" font-weight="bold" fill="#f8fafc" text-anchor="middle">
    ARQUITECTURA DE MICROSERVICIOS — DONATÓN
  </text>
  <text x="500" y="65" font-family="'Inter', sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">
    Monorepo Spring Boot (Backend) + React / Vite (Frontend) + RabbitMQ + PostgreSQL
  </text>

  <!-- ==================== FRONTEND LAYER ==================== -->
  <g transform="translate(50, 100)" filter="url(#glow-fe)">
    <rect width="140" height="420" rx="10" fill="url(#fe-grad)" opacity="0.15" stroke="#06b6d4" stroke-width="1.5" />
    <rect x="10" y="10" width="120" height="400" rx="8" fill="url(#fe-grad)" stroke="#06b6d4" stroke-width="1.5" />
    <text x="70" y="160" font-family="'Outfit', sans-serif" font-size="18" font-weight="bold" fill="#ffffff" text-anchor="middle">FRONTEND</text>
    <text x="70" y="185" font-family="'Inter', sans-serif" font-size="11" fill="#e0f2fe" text-anchor="middle">React 18 + Vite 5</text>
    <text x="70" y="210" font-family="'Inter', sans-serif" font-size="10" fill="#93c5fd" text-anchor="middle">(Vistas de Donantes,</text>
    <text x="70" y="222" font-family="'Inter', sans-serif" font-size="10" fill="#93c5fd" text-anchor="middle">Organizaciones y Admin)</text>
    
    <rect x="20" y="280" width="100" height="30" rx="5" fill="#0f172a" fill-opacity="0.6" stroke="#3b82f6" stroke-width="1" />
    <text x="70" y="299" font-family="'Inter', sans-serif" font-size="10" fill="#e2e8f0" text-anchor="middle">Vitest / Coverage</text>
  </g>

  <!-- ==================== GATEWAY / BFF LAYER ==================== -->
  <g transform="translate(240, 260)" filter="url(#glow-gw)">
    <rect width="130" height="100" rx="10" fill="url(#gw-grad)" stroke="#d946ef" stroke-width="2" />
    <text x="65" y="40" font-family="'Outfit', sans-serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">API GATEWAY</text>
    <text x="65" y="60" font-family="'Outfit', sans-serif" font-size="13" font-weight="bold" fill="#f5f3ff" text-anchor="middle">ms-gateway</text>
    <text x="65" y="80" font-family="'Inter', sans-serif" font-size="11" fill="#f5f3ff" text-anchor="middle">Puerto 8080</text>
  </g>

  <!-- Connection: Frontend -> Gateway -->
  <path d="M 190 310 L 232 310" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)" />

  <!-- ==================== MICROSERVICES LAYER ==================== -->
  <!-- ms-auth (8081) -->
  <g id="node-auth" transform="translate(450, 90)" filter="url(#glow-ms)">
    <rect width="160" height="50" rx="6" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5" />
    <text x="80" y="22" font-family="'Outfit', sans-serif" font-size="12" font-weight="bold" fill="#f8fafc" text-anchor="middle">ms-auth</text>
    <text x="80" y="38" font-family="'Inter', sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">Puerto 8081 | Identidad</text>
  </g>

  <!-- ms-donacion (8082) -->
  <g id="node-donacion" transform="translate(450, 160)" filter="url(#glow-ms)">
    <rect width="160" height="50" rx="6" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5" />
    <text x="80" y="22" font-family="'Outfit', sans-serif" font-size="12" font-weight="bold" fill="#f8fafc" text-anchor="middle">ms-donacion</text>
    <text x="80" y="38" font-family="'Inter', sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">Puerto 8082 | Donaciones</text>
  </g>

  <!-- ms-logistica (8083) -->
  <g id="node-logistica" transform="translate(450, 230)" filter="url(#glow-ms)">
    <rect width="160" height="50" rx="6" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5" />
    <text x="80" y="22" font-family="'Outfit', sans-serif" font-size="12" font-weight="bold" fill="#f8fafc" text-anchor="middle">ms-logistica</text>
    <text x="80" y="38" font-family="'Inter', sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">Puerto 8083 | Inventarios</text>
  </g>

  <!-- ms-necesidad (8084) -->
  <g id="node-necesidad" transform="translate(450, 300)" filter="url(#glow-ms)">
    <rect width="160" height="50" rx="6" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5" />
    <text x="80" y="22" font-family="'Outfit', sans-serif" font-size="12" font-weight="bold" fill="#f8fafc" text-anchor="middle">ms-necesidad</text>
    <text x="80" y="38" font-family="'Inter', sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">Puerto 8084 | Necesidades</text>
  </g>

  <!-- ms-usuarios (8085) -->
  <g id="node-usuarios" transform="translate(450, 370)" filter="url(#glow-ms)">
    <rect width="160" height="50" rx="6" fill="#1e293b" stroke="#10b981" stroke-width="1.5" />
    <text x="80" y="22" font-family="'Outfit', sans-serif" font-size="12" font-weight="bold" fill="#a7f3d0" text-anchor="middle">ms-usuarios</text>
    <text x="80" y="38" font-family="'Inter', sans-serif" font-size="10" fill="#34d399" text-anchor="middle">Puerto 8085 | Perfiles</text>
  </g>

  <!-- ms-matching (8086) -->
  <g id="node-matching" transform="translate(450, 440)" filter="url(#glow-ms)">
    <rect width="160" height="50" rx="6" fill="#1e293b" stroke="#10b981" stroke-width="1.5" />
    <text x="80" y="22" font-family="'Outfit', sans-serif" font-size="12" font-weight="bold" fill="#a7f3d0" text-anchor="middle">ms-matching</text>
    <text x="80" y="38" font-family="'Inter', sans-serif" font-size="10" fill="#34d399" text-anchor="middle">Puerto 8086 | Emparejamientos</text>
  </g>

  <!-- ms-notificaciones (8087) -->
  <g id="node-notificaciones" transform="translate(450, 510)" filter="url(#glow-ms)">
    <rect width="160" height="50" rx="6" fill="#1e293b" stroke="#10b981" stroke-width="1.5" />
    <text x="80" y="22" font-family="'Outfit', sans-serif" font-size="12" font-weight="bold" fill="#a7f3d0" text-anchor="middle">ms-notificaciones</text>
    <text x="80" y="38" font-family="'Inter', sans-serif" font-size="10" fill="#34d399" text-anchor="middle">Puerto 8087 | Canales</text>
  </g>

  <!-- Shared Library Overlay Container (ms-common) -->
  <rect x="435" y="80" width="190" height="495" rx="10" fill="none" stroke="#6366f1" stroke-width="1" stroke-dasharray="5,5" opacity="0.7" />
  <text x="615" y="75" font-family="'Outfit', sans-serif" font-size="10" font-weight="bold" fill="#a5b4fc" text-anchor="end">HEREDAN DE ms-common</text>

  <!-- Routing Lines: Gateway -> Services -->
  <!-- We draw a vertical distribution trunk -->
  <path d="M 370 310 L 400 310 L 400 115 L 442 115" stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#arrow)" />
  <path d="M 400 185 L 442 185" stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#arrow)" />
  <path d="M 400 255 L 442 255" stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#arrow)" />
  <path d="M 400 310 L 442 310" stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#arrow)" />
  <path d="M 400 310 L 400 535 L 442 535" stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#arrow)" />
  <path d="M 400 395 L 442 395" stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#arrow)" />
  <path d="M 400 465 L 442 465" stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#arrow)" />

  <!-- ==================== RABBITMQ LAYER ==================== -->
  <g transform="translate(740, 140)" filter="url(#glow-mq)">
    <rect width="160" height="70" rx="8" fill="url(#mq-grad)" stroke="#f97316" stroke-width="2" />
    <text x="80" y="32" font-family="'Outfit', sans-serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">RABBITMQ</text>
    <text x="80" y="52" font-family="'Inter', sans-serif" font-size="11" fill="#ffedd5" text-anchor="middle">Exchange: donaciones</text>
  </g>

  <!-- Pub/Sub Arrows -->
  <path d="M 610 175 L 732 175" stroke="#f97316" stroke-width="1.5" stroke-dasharray="3,3" fill="none" marker-end="url(#arrow-orange)" />
  <text x="670" y="165" font-family="'Inter', sans-serif" font-size="9" fill="#fdba74" text-anchor="middle">Publica Donación</text>

  <path d="M 820 210 L 820 465 L 618 465" stroke="#f97316" stroke-width="1.5" stroke-dasharray="3,3" fill="none" marker-end="url(#arrow-orange)" />
  <text x="815" y="340" font-family="'Inter', sans-serif" font-size="9" fill="#fdba74" text-anchor="end">Consumen matching / alertas</text>
  <path d="M 820 465 L 820 535 L 618 535" stroke="#f97316" stroke-width="1.5" stroke-dasharray="3,3" fill="none" marker-end="url(#arrow-orange)" />

  <!-- ==================== DATABASE LAYER ==================== -->
  <g transform="translate(740, 310)" filter="url(#glow-db)">
    <!-- Cylinder database graphic -->
    <path d="M 10 20 C 10 5, 150 5, 150 20 L 150 70 C 150 85, 10 85, 10 70 Z" fill="url(#db-grad)" stroke="#f43f5e" stroke-width="2" />
    <ellipse cx="80" cy="20" rx="70" ry="15" fill="#f43f5e" />
    <text x="80" y="48" font-family="'Outfit', sans-serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">POSTGRESQL</text>
    <text x="80" y="64" font-family="'Inter', sans-serif" font-size="11" fill="#ffe4e6" text-anchor="middle">Base Donaton</text>
  </g>

  <!-- DB connections from ms-common box -->
  <path d="M 625 350 L 732 350" stroke="#f43f5e" stroke-width="2" marker-end="url(#arrow-pink)" />
  <text x="680" y="342" font-family="'Inter', sans-serif" font-size="9" fill="#fca5a5" text-anchor="middle">JPA/HikariCP</text>

</svg>
